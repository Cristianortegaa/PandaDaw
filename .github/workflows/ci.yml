name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'
    - run: dotnet build PandaDaw.sln
    - run: dotnet test PandaDaw.sln
    - run: dotnet publish -c Release -o ./publish

